<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tidy handcraft</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; background: #15161a; color: #ddd;
         font-family: ui-sans-serif, system-ui, sans-serif; display: flex; }
  #stage { position: relative; flex: 1; background: #0c0d10; display: flex; }
  #scene { margin: auto; max-width: 100%; max-height: 100vh; cursor: crosshair; }
  #hint { position: absolute; left: 12px; bottom: 10px; font-size: 12px; color: #8b94a3;
          background: rgba(20,22,28,0.7); padding: 5px 9px; border-radius: 4px; }
  #actions { position: absolute; right: 12px; bottom: 10px; display: flex; gap: 8px; }
  #actions button { color: #fff; border: none; padding: 9px 16px; border-radius: 5px; cursor: pointer; font: inherit; }
  #save { background: #2f6b4e; } #save:hover { background: #3a8762; }
  #load { background: #2f4f6b; } #load:hover { background: #3a6587; }

  /* load dialog */
  #loadModal { position: absolute; inset: 0; background: rgba(8,9,12,0.6); display: none;
               align-items: center; justify-content: center; z-index: 10; }
  #loadModal.open { display: flex; }
  #loadCard { width: 380px; max-height: 70vh; background: #1b1d22; border-radius: 8px; padding: 14px;
              display: flex; flex-direction: column; gap: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  #loadCard h3 { margin: 0; font-size: 14px; }
  #loadDir { font-size: 11px; color: #8b94a3; word-break: break-all; }
  #loadList { list-style: none; margin: 0; padding: 0; overflow: auto; }
  #loadList li { padding: 8px 10px; border-radius: 4px; cursor: pointer; }
  #loadList li:hover { background: #2b303b; }
  #loadClose { align-self: flex-end; background: #3a3f4b; }

  /* floating, foldable object list */
  #objects { position: absolute; left: 12px; top: 12px; width: 230px; background: rgba(29,31,37,0.94);
             border-radius: 6px; overflow: hidden; font-size: 13px; }
  #objects h3 { margin: 0; padding: 8px 12px; font-size: 13px; cursor: pointer; background: #232732; }
  #objects.folded ul { display: none; }
  #objects ul { list-style: none; margin: 0; padding: 4px; max-height: 60vh; overflow: auto; }
  #objects li { display: flex; align-items: center; gap: 6px; padding: 5px 7px; border-radius: 4px; cursor: pointer; }
  #objects li:hover { background: #2b303b; }
  #objects li.sel { background: #3a4a78; }
  #objects li span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #objects li button { background: #6b3a2f; border: none; color: #fff; border-radius: 3px; cursor: pointer; padding: 1px 7px; }

  /* asset browser */
  #browser { width: 360px; background: #1b1d22; display: flex; flex-direction: column; padding: 10px; gap: 8px; }
  #filters input, #filters select { width: 100%; background: #2b2f38; color: #ddd; border: none;
                                     padding: 7px; border-radius: 4px; font: inherit; margin-bottom: 6px; }
  #grid { flex: 1; overflow: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-content: start; }
  .cell { background: #0c0d10; border-radius: 5px; aspect-ratio: 1; cursor: grab; border: 2px solid transparent; }
  .cell:hover { border-color: #3a4a78; }
  .cell img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  #count { font-size: 12px; color: #8b94a3; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="scene" width="1024" height="768"></canvas>
    <div id="objects"><h3 id="objects-head">Objects (0)</h3><ul id="objects-list"></ul></div>
    <div id="hint">drag an asset onto the table &middot; click to select &middot; WASD move &middot; Q/E yaw</div>
    <div id="actions">
      <button id="load">Load scene</button>
      <button id="save">Save scene</button>
    </div>
    <div id="loadModal">
      <div id="loadCard">
        <h3>Load scene</h3>
        <div id="loadDir"></div>
        <ul id="loadList"></ul>
        <button id="loadClose">Close</button>
      </div>
    </div>
  </div>

  <div id="browser">
    <div id="bg">
      <div class="bg-row">
        <label>Table</label>
        <select id="bgTable"><option value="">(plain)</option></select>
      </div>
      <div class="bg-row">
        <label>Wall</label>
        <select id="bgWall"><option value="">(plain)</option></select>
      </div>
      <div class="bg-btns">
        <button id="bgApply">Apply background</button>
        <button id="bgRandom">Randomize</button>
      </div>
    </div>
    <div id="filters">
      <input id="search" placeholder="search id..." />
      <select id="tag"><option value="">all tags</option></select>
      <select id="source"><option value="">all sources</option></select>
      <div id="count"></div>
    </div>
    <div id="grid"></div>
  </div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
const img = new Image();
img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
const send = (m) => { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(m)); };

const hintEl = document.getElementById('hint');
const HINT = hintEl.textContent;
function flashHint(text) { hintEl.textContent = text; setTimeout(() => hintEl.textContent = HINT, 2000); }

let selected = null;
ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  if (msg.type === 'saved') { flashHint('saved → ' + msg.name); return; }
  if (msg.type === 'loaded') { flashHint('loaded → ' + msg.name); return; }
  img.src = 'data:image/jpeg;base64,' + msg.image;
  selected = msg.state.selected;
  renderObjects(msg.state.objects);
  if (msg.state.background) reflectBg(msg.state.background);
};
document.getElementById('save').addEventListener('click', () => send({ type: 'save' }));

// load dialog: browse scene files on the server host and load one
const loadModal = document.getElementById('loadModal');
async function openLoad() {
  const data = await (await fetch('/scenes')).json();
  document.getElementById('loadDir').textContent = data.dir;
  const ul = document.getElementById('loadList');
  ul.innerHTML = '';
  if (!data.scenes.length) ul.innerHTML = '<li style="color:#8b94a3;cursor:default">(no saved scenes)</li>';
  for (const name of data.scenes) {
    const li = document.createElement('li');
    li.textContent = name;
    li.addEventListener('click', () => { send({ type: 'load', name }); loadModal.classList.remove('open'); });
    ul.appendChild(li);
  }
  loadModal.classList.add('open');
}
document.getElementById('load').addEventListener('click', openLoad);
document.getElementById('loadClose').addEventListener('click', () => loadModal.classList.remove('open'));
loadModal.addEventListener('click', (ev) => { if (ev.target === loadModal) loadModal.classList.remove('open'); });

// pixel mapping from a mouse event to image coordinates
function toImage(ev) {
  const r = canvas.getBoundingClientRect();
  return { x: Math.round((ev.clientX - r.left) * (canvas.width / r.width)),
           y: Math.round((ev.clientY - r.top) * (canvas.height / r.height)) };
}

canvas.addEventListener('click', (ev) => { const p = toImage(ev); send({ type: 'select_at', x: p.x, y: p.y }); });
canvas.addEventListener('dragover', (ev) => ev.preventDefault());
canvas.addEventListener('drop', (ev) => {
  ev.preventDefault();
  const p = toImage(ev);
  send({ type: 'place', asset_id: ev.dataTransfer.getData('text/plain'), x: p.x, y: p.y });
});

document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT') return;
  if ('wasdqe'.includes(ev.key)) { send({ type: 'key', name: ev.key }); ev.preventDefault(); }
});

// floating object list
const objectsBox = document.getElementById('objects');
document.getElementById('objects-head').addEventListener('click', () => objectsBox.classList.toggle('folded'));
function renderObjects(ids) {
  document.getElementById('objects-head').textContent = `Objects (${ids.length})`;
  const ul = document.getElementById('objects-list');
  ul.innerHTML = '';
  for (const id of ids) {
    const li = document.createElement('li');
    if (id === selected) li.className = 'sel';
    const label = document.createElement('span');
    label.textContent = id; li.title = id;
    li.appendChild(label);
    li.addEventListener('click', () => send({ type: 'select', scene_id: id }));
    const del = document.createElement('button');
    del.textContent = '×';
    del.addEventListener('click', (ev) => { ev.stopPropagation(); send({ type: 'delete', scene_id: id }); });
    li.appendChild(del);
    ul.appendChild(li);
  }
}

// asset browser
async function loadMeta() {
  const m = await (await fetch('/meta')).json();
  const tag = document.getElementById('tag'), source = document.getElementById('source');
  for (const t of m.tags) tag.add(new Option(t, t));
  for (const s of m.sources) source.add(new Option(s, s));
}
async function loadAssets() {
  const q = new URLSearchParams({
    search: document.getElementById('search').value,
    tag: document.getElementById('tag').value,
    source: document.getElementById('source').value,
  });
  const list = await (await fetch('/assets?' + q)).json();
  document.getElementById('count').textContent = `${list.length} assets`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const a of list) {
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.draggable = true; cell.title = a.id;
    cell.addEventListener('dragstart', (ev) => ev.dataTransfer.setData('text/plain', a.id));
    const im = document.createElement('img');
    im.loading = 'lazy'; im.src = '/preview?asset_id=' + encodeURIComponent(a.id);
    cell.appendChild(im);
    grid.appendChild(cell);
  }
}
let timer;
document.getElementById('search').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(loadAssets, 250); });
document.getElementById('tag').addEventListener('change', loadAssets);
document.getElementById('source').addEventListener('change', loadAssets);

// background controls (table/wall texture pickers + randomize)
let bgEcho = false;  // ignore the state echo right after we set the dropdowns
function reflectBg(bg) {
  if (bgEcho) { bgEcho = false; return; }
  document.getElementById('bgTable').value = bg.table_texture || '';
  document.getElementById('bgWall').value = bg.wall_texture || '';
}
async function loadTextures() {
  const t = await (await fetch('/textures')).json();
  const tbl = document.getElementById('bgTable'), wall = document.getElementById('bgWall');
  for (const id of t.table) tbl.add(new Option(id, id));
  for (const id of t.wall) wall.add(new Option(id, id));
}
document.getElementById('bgApply').addEventListener('click', () => {
  bgEcho = true;
  send({ type: 'set_bg', table_texture: document.getElementById('bgTable').value,
         wall_texture: document.getElementById('bgWall').value });
});
document.getElementById('bgRandom').addEventListener('click', () => send({ type: 'randomize_bg' }));

loadMeta();
loadTextures();
loadAssets();
</script>
</body>
</html>
