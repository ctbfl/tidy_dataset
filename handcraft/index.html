<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tidy handcraft</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; background: #15161a; color: #ddd;
         font-family: ui-sans-serif, system-ui, sans-serif; display: flex; }
  #stage { position: relative; flex: 1; background: #0c0d10; display: flex; }
  #scene { margin: auto; max-width: 100%; max-height: 100vh; cursor: crosshair; }
  #hint { position: absolute; left: 12px; bottom: 10px; font-size: 12px; color: #8b94a3;
          background: rgba(20,22,28,0.7); padding: 5px 9px; border-radius: 4px; }
  #actions { position: absolute; right: 12px; bottom: 10px; display: flex; gap: 8px; }
  #actions button { color: #fff; border: none; padding: 9px 16px; border-radius: 5px; cursor: pointer; font: inherit; }
  #save { background: #2f6b4e; } #save:hover { background: #3a8762; }
  #clear { background: #6b3a2f; } #clear:hover { background: #87493a; }

  /* floating, foldable object list */
  #objects { position: absolute; left: 12px; top: 12px; width: 240px; background: rgba(29,31,37,0.94);
             border-radius: 6px; overflow: hidden; font-size: 13px; }
  #objects h3 { margin: 0; padding: 8px 12px; font-size: 13px; cursor: pointer; background: #232732; }
  #objects.folded ul { display: none; }
  #objects ul { list-style: none; margin: 0; padding: 4px; max-height: 60vh; overflow: auto; }
  #objects li { display: flex; align-items: center; gap: 6px; padding: 5px 7px; border-radius: 4px; cursor: pointer; }
  #objects li:hover { background: #2b303b; }
  #objects li.sel { background: #3a4a78; }
  #objects li span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #objects li small { color: #8b94a3; }
  #objects li button { background: #6b3a2f; border: none; color: #fff; border-radius: 3px; cursor: pointer; padding: 1px 7px; }

  /* right panel */
  #browser { width: 380px; background: #1b1d22; display: flex; flex-direction: column; padding: 10px; gap: 10px; overflow: auto; }
  #picker { display: flex; flex-direction: column; gap: 6px; }
  #picker .row { display: flex; gap: 6px; align-items: center; }
  #picker label { width: 64px; font-size: 12px; color: #8b94a3; }
  #picker select { flex: 1; background: #2b2f38; color: #ddd; border: none; padding: 7px; border-radius: 4px; font: inherit; }
  #progress { font-size: 12px; color: #6fb98f; }

  /* manifest checklist */
  #manifest { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-content: start; }
  .mcard { position: relative; background: #0c0d10; border-radius: 5px; aspect-ratio: 1; cursor: grab;
           border: 2px solid transparent; }
  .mcard:hover { border-color: #3a4a78; }
  .mcard.placed { cursor: default; opacity: 0.55; }
  .mcard.placed:hover { border-color: transparent; }
  .mcard img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  .mrole { position: absolute; left: 0; right: 0; bottom: 0; font-size: 10px; text-align: center;
           color: #c7ccd6; background: rgba(12,13,16,0.7); padding: 1px 0; pointer-events: none;
           overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .check { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%;
           background: #2fae5f; color: #fff; font-size: 12px; line-height: 18px; text-align: center;
           box-shadow: 0 0 0 2px rgba(12,13,16,0.8); pointer-events: none; }

  details { background: #161820; border-radius: 5px; padding: 4px 8px; }
  details > summary { cursor: pointer; font-size: 12px; color: #aab2c0; padding: 4px 0; user-select: none; }
  .bg-row { display: flex; gap: 6px; align-items: center; margin: 4px 0; }
  .bg-row label { width: 48px; font-size: 12px; color: #8b94a3; }
  .bg-row select { flex: 1; background: #2b2f38; color: #ddd; border: none; padding: 6px; border-radius: 4px; font: inherit; }
  .bg-btns { display: flex; gap: 6px; margin-top: 6px; }
  .bg-btns button { flex: 1; background: #34465f; color: #fff; border: none; padding: 7px; border-radius: 4px; cursor: pointer; font: inherit; }
  #filters input, #filters select { width: 100%; background: #2b2f38; color: #ddd; border: none;
                                     padding: 7px; border-radius: 4px; font: inherit; margin: 6px 0 0; }
  #grid { margin-top: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-content: start;
          max-height: 40vh; overflow: auto; }
  .cell { background: #0c0d10; border-radius: 5px; aspect-ratio: 1; cursor: grab; border: 2px solid transparent; }
  .cell:hover { border-color: #3a4a78; }
  .cell img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  #count { font-size: 12px; color: #8b94a3; margin-top: 6px; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="scene" width="1024" height="768"></canvas>
    <div id="objects"><h3 id="objects-head">Objects (0)</h3><ul id="objects-list"></ul></div>
    <div id="hint">drag a checklist item onto the table &middot; click to select &middot; WASD move &middot; Q/E yaw</div>
    <div id="actions">
      <button id="clear">Clear</button>
      <button id="save">Save scene</button>
    </div>
  </div>

  <div id="browser">
    <div id="picker">
      <div class="row"><label>Scenario</label><select id="scenario"></select></div>
      <div class="row"><label>Scene</label><select id="sceneSel"></select></div>
      <div id="progress"></div>
    </div>

    <div id="manifest"></div>

    <details id="extra">
      <summary>Add extra object (full library)</summary>
      <div id="filters">
        <input id="search" placeholder="search id..." />
        <select id="tag"><option value="">all tags</option></select>
        <select id="source"><option value="">all sources</option></select>
        <div id="count"></div>
      </div>
      <div id="grid"></div>
    </details>

    <details id="bgbox">
      <summary>Background (table / wall texture)</summary>
      <div class="bg-row"><label>Table</label><select id="bgTable"><option value="">(plain)</option></select></div>
      <div class="bg-row"><label>Wall</label><select id="bgWall"><option value="">(plain)</option></select></div>
      <div class="bg-btns">
        <button id="bgApply">Apply</button>
        <button id="bgRandom">Randomize</button>
      </div>
    </details>
  </div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
const img = new Image();
img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws');
const send = (m) => { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(m)); };

const hintEl = document.getElementById('hint');
const HINT = hintEl.textContent;
function flashHint(text) { hintEl.textContent = text; setTimeout(() => hintEl.textContent = HINT, 2000); }

let selected = null;          // selected scene object id
let currentScenario = null;   // truthy => scenario annotation mode (save writes back)
let dragPayload = null;       // {slot} from a checklist card, or {asset_id} from the extra library

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  if (msg.type === 'saved') { flashHint('saved → ' + msg.name); refreshSceneProgress(); return; }
  if (msg.type === 'loaded') { flashHint('loaded → ' + msg.name); return; }
  img.src = 'data:image/jpeg;base64,' + msg.image;
  const st = msg.state;
  selected = st.selected;
  currentScenario = st.scenario || null;
  renderManifest(st.manifest || []);
  renderObjects(st.objects, st.slots || {});
  if (st.background) reflectBg(st.background);
};

document.getElementById('save').addEventListener('click', () => {
  if (currentScenario) { send({ type: 'save' }); return; }   // scenario mode: write back in place
  const name = prompt('Save scene as (blank = auto-numbered):', '');
  if (name === null) return;
  send({ type: 'save', name: name.trim() });
});
document.getElementById('clear').addEventListener('click', () => {
  if (confirm('Clear all placed objects from this scene?')) send({ type: 'clear' });
});

// pixel mapping from a mouse event to image coordinates
function toImage(ev) {
  const r = canvas.getBoundingClientRect();
  return { x: Math.round((ev.clientX - r.left) * (canvas.width / r.width)),
           y: Math.round((ev.clientY - r.top) * (canvas.height / r.height)) };
}

canvas.addEventListener('click', (ev) => { const p = toImage(ev); send({ type: 'select_at', x: p.x, y: p.y }); });
canvas.addEventListener('dragover', (ev) => ev.preventDefault());
canvas.addEventListener('drop', (ev) => {
  ev.preventDefault();
  const p = toImage(ev);
  if (dragPayload && dragPayload.slot) send({ type: 'place', slot: dragPayload.slot, x: p.x, y: p.y });
  else if (dragPayload && dragPayload.asset_id) send({ type: 'place', asset_id: dragPayload.asset_id, x: p.x, y: p.y });
  dragPayload = null;
});

document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT') return;
  if ('wasdqe'.includes(ev.key)) { send({ type: 'key', name: ev.key }); ev.preventDefault(); }
});

// floating object list (label with slot, or "extra")
const objectsBox = document.getElementById('objects');
document.getElementById('objects-head').addEventListener('click', () => objectsBox.classList.toggle('folded'));
function renderObjects(ids, slots) {
  document.getElementById('objects-head').textContent = `Objects (${ids.length})`;
  const ul = document.getElementById('objects-list');
  ul.innerHTML = '';
  for (const id of ids) {
    const li = document.createElement('li');
    if (id === selected) li.className = 'sel';
    const label = document.createElement('span');
    label.textContent = slots[id] || id; li.title = id;
    li.appendChild(label);
    if (!slots[id]) { const tag = document.createElement('small'); tag.textContent = 'extra'; li.appendChild(tag); }
    li.addEventListener('click', () => send({ type: 'select', scene_id: id }));
    const del = document.createElement('button');
    del.textContent = '×';
    del.addEventListener('click', (ev) => { ev.stopPropagation(); send({ type: 'delete', scene_id: id }); });
    li.appendChild(del);
    ul.appendChild(li);
  }
}

// checklist (manifest) cards: thumbnail + role label + a green check when placed
function renderManifest(manifest) {
  const box = document.getElementById('manifest');
  box.innerHTML = '';
  let placed = 0;
  for (const m of manifest) {
    if (m.placed) placed++;
    const card = document.createElement('div');
    card.className = 'mcard' + (m.placed ? ' placed' : '');
    card.draggable = !m.placed;            // a slot is one-shot; delete to re-place
    card.title = `${m.slot}\n${m.asset_id}`;
    card.addEventListener('dragstart', () => { dragPayload = { slot: m.slot }; });
    const im = document.createElement('img');
    im.loading = 'lazy'; im.src = '/preview?asset_id=' + encodeURIComponent(m.asset_id);
    card.appendChild(im);
    const role = document.createElement('div'); role.className = 'mrole'; role.textContent = m.slot;
    card.appendChild(role);
    if (m.placed) { const c = document.createElement('div'); c.className = 'check'; c.textContent = '✓'; card.appendChild(c); }
    box.appendChild(card);
  }
  document.getElementById('progress').textContent =
    manifest.length ? `${placed} / ${manifest.length} placed` : '(no checklist — load a scenario)';
  const opt = [...sceneSel.options].find((o) => o.value === sceneSel.value);
  if (opt && manifest.length) opt.text = `${sceneSel.value} — ${placed}/${manifest.length}`;
}

// scenario / scene pickers
const scenarioSel = document.getElementById('scenario');
const sceneSel = document.getElementById('sceneSel');
async function loadScenarios() {
  const { scenarios } = await (await fetch('/scenarios')).json();
  scenarioSel.innerHTML = '';
  for (const s of scenarios) scenarioSel.add(new Option(s, s));
  if (scenarios.length) await loadScenes();
}
async function loadScenes() {
  const scenario = scenarioSel.value;
  const { scenes } = await (await fetch('/scenario_scenes?scenario=' + encodeURIComponent(scenario))).json();
  sceneSel.innerHTML = '';
  for (const s of scenes) sceneSel.add(new Option(`${s.scene} — ${s.placed}/${s.total}`, s.scene));
  if (scenes.length) loadSceneNow();
}
function loadSceneNow() { send({ type: 'load_scene', scenario: scenarioSel.value, scene: sceneSel.value }); }
async function refreshSceneProgress() {
  if (!scenarioSel.value) return;
  const keep = sceneSel.value;
  const { scenes } = await (await fetch('/scenario_scenes?scenario=' + encodeURIComponent(scenarioSel.value))).json();
  sceneSel.innerHTML = '';
  for (const s of scenes) sceneSel.add(new Option(`${s.scene} — ${s.placed}/${s.total}`, s.scene));
  sceneSel.value = keep;
}
scenarioSel.addEventListener('change', loadScenes);
sceneSel.addEventListener('change', loadSceneNow);

// extra-object browser (full library)
async function loadMeta() {
  const m = await (await fetch('/meta')).json();
  const tag = document.getElementById('tag'), source = document.getElementById('source');
  for (const t of m.tags) tag.add(new Option(t, t));
  for (const s of m.sources) source.add(new Option(s, s));
}
async function loadAssets() {
  const q = new URLSearchParams({
    search: document.getElementById('search').value,
    tag: document.getElementById('tag').value,
    source: document.getElementById('source').value,
  });
  const list = await (await fetch('/assets?' + q)).json();
  document.getElementById('count').textContent = `${list.length} assets`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const a of list) {
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.draggable = true; cell.title = a.id;
    cell.addEventListener('dragstart', () => { dragPayload = { asset_id: a.id }; });
    const im = document.createElement('img');
    im.loading = 'lazy'; im.src = '/preview?asset_id=' + encodeURIComponent(a.id);
    cell.appendChild(im);
    grid.appendChild(cell);
  }
}
let timer;
document.getElementById('search').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(loadAssets, 250); });
document.getElementById('tag').addEventListener('change', loadAssets);
document.getElementById('source').addEventListener('change', loadAssets);

// background controls (table/wall texture pickers + randomize)
let bgEcho = false;  // ignore the state echo right after we set the dropdowns
function reflectBg(bg) {
  if (bgEcho) { bgEcho = false; return; }
  document.getElementById('bgTable').value = bg.table_texture || '';
  document.getElementById('bgWall').value = bg.wall_texture || '';
}
async function loadTextures() {
  const t = await (await fetch('/textures')).json();
  const tbl = document.getElementById('bgTable'), wall = document.getElementById('bgWall');
  for (const id of t.table) tbl.add(new Option(id, id));
  for (const id of t.wall) wall.add(new Option(id, id));
}
document.getElementById('bgApply').addEventListener('click', () => {
  bgEcho = true;
  send({ type: 'set_bg', table_texture: document.getElementById('bgTable').value,
         wall_texture: document.getElementById('bgWall').value });
});
document.getElementById('bgRandom').addEventListener('click', () => send({ type: 'randomize_bg' }));

// init: HTTP fetches now; ws-dependent loads once the socket opens
loadMeta();
loadAssets();
ws.addEventListener('open', () => { loadTextures(); loadScenarios(); });
</script>
</body>
</html>
