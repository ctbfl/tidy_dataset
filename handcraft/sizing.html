<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>asset sizing</title>
<style>
  :root { --bg:#1d1f23; --panel:#26292f; --line:#3a3e46; --fg:#e7e9ee; --mut:#9aa0ab; --acc:#5b9bd5; }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; font:13px/1.45 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  #stage { flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-width:0; }
  #view { max-width:100%; max-height:100%; }
  #hud { position:absolute; left:14px; top:12px; background:rgba(0,0,0,.62); padding:8px 12px; border-radius:8px; font-variant-numeric:tabular-nums; }
  #hud .big { font-size:20px; font-weight:600; }
  #hud .mut { color:var(--mut); }
  #panel { width:360px; background:var(--panel); border-left:1px solid var(--line); display:flex; flex-direction:column; }
  #panel > div { padding:12px 14px; border-bottom:1px solid var(--line); }
  h3 { margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); }
  input, select, button { font:inherit; color:var(--fg); background:#1b1d21; border:1px solid var(--line); border-radius:6px; padding:6px 8px; }
  button { background:#33373f; cursor:pointer; }
  button:hover { border-color:var(--acc); }
  button.primary { background:var(--acc); color:#10131a; border-color:var(--acc); font-weight:600; }
  button:disabled { opacity:.4; cursor:default; }
  .row { display:flex; gap:6px; align-items:center; }
  .row + .row { margin-top:6px; }
  .grow { flex:1; min-width:0; }
  #search { width:100%; }
  #grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-height:230px; overflow:auto; margin-top:8px; }
  #grid img { width:100%; aspect-ratio:1; object-fit:contain; background:#fff; border-radius:5px; border:2px solid transparent; cursor:pointer; }
  #grid img:hover { border-color:var(--acc); }
  #tid { font-size:12px; word-break:break-all; color:var(--fg); }
  .tags { color:var(--mut); font-size:11px; margin-top:2px; }
  .mut { color:var(--mut); }
  label { color:var(--mut); font-size:11px; }
  #refs .ref { display:flex; gap:5px; margin-bottom:5px; }
  #refs .ref input.id { flex:1; min-width:0; }
  #refs .ref input.cm { width:62px; }
  #status { font-size:11px; color:var(--mut); min-height:14px; }
  .factbtns button { padding:5px 7px; }
</style>
</head>
<body>
  <div id="stage">
    <img id="view" alt="scene">
    <div id="hud"><div class="big" id="hudDims">— load an asset —</div><div class="mut" id="hudFactor"></div></div>
  </div>

  <div id="panel">
    <div>
      <h3>browse assets</h3>
      <div class="row">
        <input id="search" placeholder="search id… (e.g. speaker, screen)">
      </div>
      <div class="row" style="margin-top:6px;">
        <select id="source" class="grow"><option value="">all sources</option></select>
        <button id="prev" title="previous result">◀</button>
        <button id="next" title="next result">▶</button>
      </div>
      <div id="grid"></div>
    </div>

    <div>
      <h3>target</h3>
      <div id="tid" class="mut">none</div>
      <div class="tags" id="ttags"></div>
      <div class="mut" id="tbase" style="margin-top:4px;"></div>
    </div>

    <div>
      <h3>uniform scale</h3>
      <div class="row">
        <input id="slider" class="grow" type="range" min="-1.3" max="1.3" step="0.001" value="0" disabled>
      </div>
      <div class="row" style="margin-top:6px;">
        <label>factor ×</label>
        <input id="factor" class="grow" type="number" step="0.01" min="0.001" disabled>
        <button id="reset" disabled>reset</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <label>set</label>
        <select id="axis" disabled>
          <option value="longest">longest</option>
          <option value="0">width</option>
          <option value="1">depth</option>
          <option value="2">height</option>
        </select>
        <label>to</label>
        <input id="cm" class="grow" type="number" step="0.5" placeholder="cm" disabled>
        <button id="applyCm" disabled>set cm</button>
      </div>
    </div>

    <div>
      <h3>references (anchors)</h3>
      <div id="refs"></div>
      <div class="row"><button id="applyRefs" class="grow">apply references</button></div>
    </div>

    <div style="margin-top:auto;">
      <div class="row"><button id="save" class="primary grow" disabled>Save scale → asset.json</button></div>
      <div id="status" style="margin-top:6px;"></div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let ws, state = {target:null, refs:[]}, results = [], idx = -1;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === "frame") { $("view").src = "data:image/jpeg;base64," + m.image; state = m.state; renderState(); }
    else if (m.type === "saved") { const d = m.info.dims_cm || []; $("status").textContent = `saved ${m.info.asset_id} — ${d.join(" × ")} cm`; }
    else if (m.type === "error") { $("status").textContent = "error: " + m.message; }
  };
  ws.onclose = () => setTimeout(connect, 800);
}
const send = o => ws && ws.readyState === 1 && ws.send(JSON.stringify(o));

function renderState() {
  const t = state.target;
  if (t) {
    $("tid").textContent = t.asset_id;
    $("ttags").textContent = (t.tags || []).join(" · ");
    $("tbase").textContent = `source ${t.source} · base ${ (t.base_dims_cm||[]).join("×") } cm`;
    const d = t.dims_cm || [];
    $("hudDims").textContent = d.length ? `${d[0]} × ${d[1]} × ${d[2]} cm` : "(no aabb)";
    $("hudFactor").innerHTML = `factor ×${t.factor}<span class="mut"> &nbsp; W×D×H</span>`;
    $("factor").value = t.factor;
    $("slider").value = Math.max(-1.3, Math.min(1.3, Math.log10(t.factor)));
    ["factor","slider","reset","axis","cm","applyCm","save"].forEach(i => $(i).disabled = false);
  } else {
    $("tid").textContent = "none"; $("ttags").textContent = ""; $("tbase").textContent = "";
    $("hudDims").textContent = "— load an asset —"; $("hudFactor").textContent = "";
  }
  if (!$("refs").dataset.init) buildRefRows();
}

function buildRefRows() {
  $("refs").innerHTML = "";
  (state.refs.length ? state.refs : [{},{},{}]).slice(0,3).forEach(r => {
    const row = document.createElement("div"); row.className = "ref";
    row.innerHTML = `<input class="id" placeholder="asset_id" value="${r.asset_id||""}">
                     <input class="cm" type="number" placeholder="cm" value="${r.real_cm||""}">`;
    $("refs").appendChild(row);
  });
  $("refs").dataset.init = "1";
}

// -- asset browser --
let searchTimer;
async function loadAssets() {
  const q = encodeURIComponent($("search").value.trim());
  const s = encodeURIComponent($("source").value);
  results = await (await fetch(`/assets?search=${q}&source=${s}`)).json();
  idx = -1;
  const g = $("grid"); g.innerHTML = "";
  results.forEach((a, i) => {
    const im = document.createElement("img");
    im.src = "/preview?asset_id=" + encodeURIComponent(a.id);
    im.title = a.id; im.loading = "lazy";
    im.onclick = () => { idx = i; send({type:"load_target", asset_id:a.id}); };
    g.appendChild(im);
  });
}
$("search").oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(loadAssets, 250); };
$("source").onchange = loadAssets;
const step = d => { if (!results.length) return; idx = (idx + d + results.length) % results.length; send({type:"load_target", asset_id: results[idx].id}); };
$("prev").onclick = () => step(-1);
$("next").onclick = () => step(1);

// -- scale controls --
$("slider").oninput = () => send({type:"set_factor", factor: Math.pow(10, parseFloat($("slider").value))});
$("factor").onchange = () => send({type:"set_factor", factor: parseFloat($("factor").value)});
$("reset").onclick = () => send({type:"reset"});
$("applyCm").onclick = () => { const cm = parseFloat($("cm").value); if (cm > 0) send({type:"set_abs", axis:$("axis").value, cm}); };
$("cm").addEventListener("keydown", e => { if (e.key === "Enter") $("applyCm").click(); });
$("applyRefs").onclick = () => {
  const refs = [...$("refs").querySelectorAll(".ref")].map(r => ({
    asset_id: r.querySelector(".id").value.trim(),
    real_cm: parseFloat(r.querySelector(".cm").value) || 0,
  })).filter(r => r.asset_id);
  send({type:"set_refs", refs});
};
$("save").onclick = () => { $("status").textContent = "saving…"; send({type:"save"}); };

// init
fetch("/sources").then(r => r.json()).then(d => d.sources.forEach(s => {
  const o = document.createElement("option"); o.value = o.textContent = s; $("source").appendChild(o);
}));
connect();
loadAssets();
</script>
</body>
</html>
